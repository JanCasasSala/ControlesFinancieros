name: Monitor Golar
on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install yfinance requests matplotlib pandas
      - name: Ejecutar monitor
        run: python golar/monitor_golar_v6.py
      - name: Guardar informe HTML como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: informe-golar
          path: golar/Monitor_Golar.html
      - name: Commit y push archivos generados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add golar/Monitor_Golar.html golar/hitos_historial.json
          git diff --staged --quiet || git commit -m "Auto: monitor actualizado"
          git push
