name: Monitor Nucleo

on:
  schedule:
    - cron: '5 17 * * 1-5'   # 17:05 UTC — 18:05 España invierno / 19:05 verano
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install yfinance requests matplotlib pandas

      - name: Ejecutar monitor
        run: python nucleo/monitor_nucleo_v1.py

      - name: Commit y push archivos generados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add nucleo/Monitor_Nucleo.html nucleo/hitos_nucleo.json
          git diff --staged --quiet || git commit -m "Auto: monitor nucleo actualizado"
          git push
