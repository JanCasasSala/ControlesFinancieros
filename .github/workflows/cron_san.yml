name: Cron Monitor Santander
on:
  schedule:
    - cron: '0 21 * * 5'  # Ejecución automática: Viernes 22:00 (España)
  workflow_dispatch:      # <--- ESTA LÍNEA PERMITE EL LANZAMIENTO MANUAL

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Instalar Librerias
        run: |
          pip install yfinance pandas matplotlib requests
      - name: Ejecutar Monitor
        run: python monitor_san.py
