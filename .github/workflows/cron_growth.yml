name: Cron Monitor Growth

on:
  schedule:
    # Se ejecuta de Lunes a Viernes a las 22:00 UTC (Cierre de mercado USA)
    - cron: '0 22 * * 1-5'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerias
        run: pip install yfinance pandas matplotlib requests tabulate
        
      - name: Listar archivos para verificar
        run: ls -R  # Esto imprimirá todos los archivos en el log para que veas

      - name: Ejecutar Monitor Growth
        env:
          # Conecta los Secrets de GitHub con el script
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_growth.py
